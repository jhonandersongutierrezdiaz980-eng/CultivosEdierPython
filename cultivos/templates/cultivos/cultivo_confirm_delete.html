<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Cultivo</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center py-4">
                <p class="fs-5">¿Estás seguro de que deseas eliminar permanentemente el registro de <strong>"{{ object.nombre }}"</strong> del vecino <strong>{{ object.agricultor }}</strong>?</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'cultivo_list' %}" class="btn btn-secondary me-2">No, Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, Confirmar y Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
